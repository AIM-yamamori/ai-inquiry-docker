services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: inquiry-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./data:/app/data


  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: inquiry-frontend

    ports:
      - "8501:8501"

    environment:
      BACKEND_URL: http://backend:8000

    depends_on:
      - backend